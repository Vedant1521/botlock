<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botlock · HTTP 402 Paywall for AI Agents</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..200" />

  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-hover: #1a1a1a;
      --border: #1e1e1e;
      --border-hover: #2a2a2a;
      --text: #ffffff;
      --text-secondary: #a1a1a1;
      --text-tertiary: #666666;
      --white-90: rgba(255,255,255,0.9);
      --white-50: rgba(255,255,255,0.5);
      --white-10: rgba(255,255,255,0.1);
      --white-05: rgba(255,255,255,0.05);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .navbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--white-90);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-brand-icon .material-symbols-rounded {
      font-size: 18px;
      color: #000;
      font-variation-settings: 'FILL' 1, 'wght' 600;
    }

    .nav-brand-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .hero {
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .hero-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 28px;
      border-radius: 16px;
      background: var(--white-90);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: heroFade 500ms var(--ease-out) 100ms forwards;
    }

    .hero-logo .material-symbols-rounded {
      font-size: 32px;
      color: #000;
      font-variation-settings: 'FILL' 1, 'wght' 600;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -1.2px;
      line-height: 1.1;
      margin-bottom: 12px;
      opacity: 0;
      animation: heroFade 500ms var(--ease-out) 200ms forwards;
    }

    .hero p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 36px;
      max-width: 480px;
      opacity: 0;
      animation: heroFade 500ms var(--ease-out) 300ms forwards;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: heroFade 500ms var(--ease-out) 400ms forwards;
    }

    @keyframes heroFade {
      to { opacity: 1; }
    }

    .btn {
      position: relative;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 44px;
      padding: 0 24px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: transform 160ms var(--ease-out), background-color 200ms var(--ease-out);
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: currentColor;
      opacity: 0;
      transition: opacity 100ms var(--ease-out);
      pointer-events: none;
      z-index: 0;
    }

    .btn > * { position: relative; z-index: 1; }
    .btn:hover::after { opacity: 0.08; }
    .btn:active::after { opacity: 0.12; }
    .btn:active { transform: scale(0.97); }

    .btn--primary {
      background: var(--white-90);
      color: #000;
    }

    .btn--secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn--secondary:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .btn .material-symbols-rounded {
      font-size: 18px;
      font-variation-settings: 'FILL' 0, 'wght' 400;
    }

    @media (max-width: 520px) {
      .hero h1 { font-size: 30px; }
      .hero p { font-size: 15px; }
      .hero-actions { flex-direction: column; width: 100%; }
      .btn { width: 100%; justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="nav-brand">
        <div class="nav-brand-icon">
          <span class="material-symbols-rounded">shield</span>
        </div>
        <span class="nav-brand-text">Botlock</span>
      </a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-logo">
      <span class="material-symbols-rounded">shield</span>
    </div>
    <h1>Paywalls for AI agents.<br>Powered by Solana.</h1>
    <p>Publishers drop in two lines of SDK to gate any route and receive USDC micropayments directly to their Solana wallet. AI agents pay automatically, or they don't get in.</p>
    <div class="hero-actions">
      <a href="/dashboard" class="btn btn--primary">
        <span class="material-symbols-rounded">dashboard</span>
        <span>Publisher Dashboard</span>
      </a>
      <a href="/.well-known/ai-policy.json" class="btn btn--secondary">
        <span class="material-symbols-rounded">policy</span>
        <span>AI Policy</span>
      </a>
    </div>
  </div>

</body>
</html>
